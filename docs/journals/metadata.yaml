    description: "Explores the initial credential workflow and evaluates different architectural approaches for exposing Standard and Ledger credential operations through the public API."
    status: "Superseded"
  credential-methods-tradeoffs.jpg:
    description: "Evaluates the trade-offs between the remaining credential API designs, comparing developer experience, internal architecture, and design philosophy before choosing the final approach."
    status: "Historical"
  credential-unknown-discovery.jpg:
    description: "Explores the limitations of implementing a unified credential API in C++, examining function overloading, mode-dependent parameter handling, and compile-time type constraints that influenced the final architecture."
    status: "Abandoned"
  credential-context-realization.jpg:
    description: "Explores a context-based credential API and examines whether a shared context object can unify mode-specific operations, ultimately recognizing its limitations due to differing parameter and return-type requirements across credential workflows."
    status: "Abandoned"
  credential-explored-methods.jpg:
    decription: "Summarizes all explored credential API designs and evaluates their architectural trade-offs, concluding with the Modularity Method as the most stable solution based on API simplicity, maintainability, scalability, mode isolation, and internal modularity."
    status: "Implemented"
    featured: "Summarizes every explored credential architecture and explains why the Modularity Method became the foundation of the RepX credential API."
  modes-classes-origin.jpg:
    description: "Documents the origin of mode-specific credential classes and their integration into the RepX API, introducing dedicated implementations for Ledger and Standard modes alongside the corresponding source tree organization."
    status: "Historical"
  modularity-method-origin.jpg:
    decription: "Documents the initial design of the Modularity Method, exploring how mode-specific credential operations can be exposed through dedicated API objects while preserving a unified and extensible credential architecture."
    status: "Historical"
    featured: Introduces the Modularity Method and its initial API structure, establishing the foundation for RepX's mode-specific credential architecture.