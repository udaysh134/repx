  credential-api-finalization.jpg:
    description: "Finalizes the credential API design by comparing all explored approaches and selecting the unified architecture based on consistency, usability, and separation of responsibilities."
    status: "Abandoned"
  credential-method-1-overview.jpg:
    description: "Introduces the first credential architecture, where mode-specific credential objects are created and managed explicitly by the caller before interacting with the engine."
    status: "Historical"
