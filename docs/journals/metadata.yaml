    description: "Refines the third credential architecture by defining a unified entry point that returns mode-specific credential objects with their own specialized operations and parameter requirements."
    status: "Abandoned"
  credential-method-3-origin.jpg:
    description: "Documents the reasoning process that led to the Unified Space Method, examining how mode selection can simplify the public API while preserving internal flexibility."
    status: "Superseded"
  credential-methods-comparasion-1.jpg:
    description: "Compares the first and second credential API designs, evaluating their workflow complexity, user responsibilities, and overall developer experience."
    status: "Historical"
  credential-methods-comparasion-2.jpg:
    description: "Continues the comparison by introducing additional alternatives, refining the unified design, and documenting the architectural reasoning behind the final decision."
    status: "Historical"
